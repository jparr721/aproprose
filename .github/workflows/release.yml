name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag must match tauri.conf.json and be strictly newest
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          tag_ver="${tag#v}"
          conf_ver="$(jq -r .version src-tauri/tauri.conf.json)"
          if [ "$tag_ver" != "$conf_ver" ]; then
            echo "::error::tag $tag (=$tag_ver) does not match tauri.conf.json version $conf_ver"
            exit 1
          fi
          if [ "${{ github.event.created }}" != "true" ]; then
            echo "::error::tag $tag already existed (force-update/overwrite); published releases cannot be overwritten"
            exit 1
          fi
          others="$(git tag --list 'v*' | grep -vxF "$tag" || true)"
          if [ -n "$others" ]; then
            highest="$(printf '%s\n' "$others" | sed 's/^v//' | sort -V | tail -n1)"
            newest="$(printf '%s\n%s\n' "$tag_ver" "$highest" | sort -V | tail -n1)"
            if [ "$tag_ver" = "$highest" ] || [ "$newest" != "$tag_ver" ]; then
              echo "::error::version $tag_ver is not greater than the highest existing tag $highest"
              exit 1
            fi
          fi
          echo "guard ok: $tag_ver matches config and is the newest version"

  create-release:
    name: create draft release
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Create the draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { execFileSync } = require('child_process');
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            // scripts/release-body.ts validates the changelog entry and builds the body
            // (the same format the in-app parseUpdateNotes inverts). It exits non-zero with
            // an actionable message if the entry is missing or malformed.
            let body;
            try {
              body = execFileSync('bun', ['run', 'scripts/release-body.ts', version], {
                encoding: 'utf8',
              });
            } catch (e) {
              const detail = e.stderr ? e.stderr.toString() : e.message;
              core.setFailed(`failed to build release body for ${version}: ${detail}`);
              throw e;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `aproprose ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: build ${{ matrix.platform }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - platform: ubuntu-22.04
            target: ""
            args: "--bundles deb,appimage"
          - platform: windows-latest
            target: ""
            args: "--bundles nsis"
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        # The build matrix includes windows-latest, where the default shell is
        # PowerShell. Force bash (Git Bash on Windows) so every run step's POSIX
        # script - notably the updater-notes heredoc below - works on all platforms.
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - run: bun install --frozen-lockfile
      - name: Build the updater changelog notes for this version
        id: notes
        # tauri-action defaults latest.json `notes` to a generic "See the assets..."
        # string. The in-app updater surfaces `notes` as the upcoming version's changelog
        # ("See changes"), so feed it the real entry via releaseBody - the same body
        # release-body.ts builds for the GitHub release, which parseUpdateNotes inverts.
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          {
            echo 'body<<RELEASE_BODY_EOF'
            bun run scripts/release-body.ts "$version"
            echo
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseBody: ${{ steps.notes.outputs.body }}
          args: ${{ matrix.args }}

  publish-release:
    name: verify and publish
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify latest.json covers all platforms, then publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          set -euo pipefail
          asset_url="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[] | select(.name=="latest.json") | .url')"
          if [ -z "$asset_url" ]; then
            echo "::error::latest.json was not uploaded to the release"
            exit 1
          fi
          gh api "$asset_url" -H "Accept: application/octet-stream" > latest.json
          for plat in darwin-aarch64 linux-x86_64 windows-x86_64; do
            if ! jq -e --arg p "$plat" '.platforms[$p]' latest.json >/dev/null; then
              echo "::error::latest.json is missing platform $plat"
              cat latest.json
              exit 1
            fi
          done
          echo "latest.json contains darwin-aarch64, linux-x86_64, and windows-x86_64"
          notes="$(jq -r '.notes' latest.json)"
          if [ -z "$notes" ] || [ "$notes" = "null" ] || [ "$notes" = "See the assets to download this version and install." ]; then
            echo "::error::latest.json notes is empty or the tauri-action default; the in-app updater would show no real changelog for this version"
            cat latest.json
            exit 1
          fi
          echo "latest.json carries real release notes"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false -F prerelease=false
