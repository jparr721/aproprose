name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  guard:
    name: version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag must match tauri.conf.json and be strictly newest
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          tag_ver="${tag#v}"
          conf_ver="$(jq -r .version src-tauri/tauri.conf.json)"
          if [ "$tag_ver" != "$conf_ver" ]; then
            echo "::error::tag $tag (=$tag_ver) does not match tauri.conf.json version $conf_ver"
            exit 1
          fi
          if [ "${{ github.event.created }}" != "true" ]; then
            echo "::error::tag $tag already existed (force-update/overwrite); published releases cannot be overwritten"
            exit 1
          fi
          others="$(git tag --list 'v*' | grep -vxF "$tag" || true)"
          if [ -n "$others" ]; then
            highest="$(printf '%s\n' "$others" | sed 's/^v//' | sort -V | tail -n1)"
            newest="$(printf '%s\n%s\n' "$tag_ver" "$highest" | sort -V | tail -n1)"
            if [ "$tag_ver" = "$highest" ] || [ "$newest" != "$tag_ver" ]; then
              echo "::error::version $tag_ver is not greater than the highest existing tag $highest"
              exit 1
            fi
          fi
          echo "guard ok: $tag_ver matches config and is the newest version"

  create-release:
    name: create draft release
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create the draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const version = tag.replace(/^v/, '');
            const changelog = JSON.parse(fs.readFileSync('changelog.json', 'utf8'));
            const entry = changelog.find((e) => e.version === version);
            if (!entry) {
              core.setFailed(`changelog.json has no entry for ${version}`);
              throw new Error(`no changelog entry for ${version}`);
            }
            const body = [entry.summary, '', ...entry.highlights.map((h) => `- ${h}`)].join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `aproprose ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: build ${{ matrix.platform }}
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin --bundles app,dmg"
          - platform: ubuntu-22.04
            target: ""
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - run: bun install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: verify and publish
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Verify latest.json covers all platforms, then publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          set -euo pipefail
          asset_url="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" --jq '.[] | select(.name=="latest.json") | .url')"
          if [ -z "$asset_url" ]; then
            echo "::error::latest.json was not uploaded to the release"
            exit 1
          fi
          gh api "$asset_url" -H "Accept: application/octet-stream" > latest.json
          for plat in darwin-aarch64 linux-x86_64; do
            if ! jq -e --arg p "$plat" '.platforms[$p]' latest.json >/dev/null; then
              echo "::error::latest.json is missing platform $plat"
              cat latest.json
              exit 1
            fi
          done
          echo "latest.json contains darwin-aarch64 and linux-x86_64"
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" -F draft=false -F prerelease=false
